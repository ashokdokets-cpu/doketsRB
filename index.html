async function showPaymentSuccess(paymentId, orderId, signature, plan) {

    function parseAndMatch() {
        const jd = App.jobTarget.description.toLowerCase().trim();
        if (jd.length < 30) { alert('Please paste a complete job description (at least 30 characters).'); return; }
        const jt = { ...App.jobTarget, parsed: true };
        const skillMap = ['python','java','javascript','typescript','react','angular','vue','node','sql','mongodb','postgresql','aws','azure','docker','kubernetes','terraform','git','rest api','graphql','machine learning','data analysis','excel','tableau','power bi','figma','adobe','salesforce','hubspot','google analytics','seo','agile','scrum','jira','confluence','c++','c#','.net','php','django','flask','swift','kotlin','flutter','leadership','communication','project management','stakeholder management','strategic','analytical','problem-solving','team management','negotiation','mentoring'];
        jt.requiredSkills = []; jt.keywords = [];
        skillMap.forEach(skill => {
            const regex = new RegExp('\\b' + skill.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + '\\b', 'gi');
            const matches = jd.match(regex);
            if (matches) {
                if (/required|must have|essential/i.test(jd) && jd.indexOf(skill) > jd.search(/required|must have|essential/i)) jt.requiredSkills.push(skill);
                else jt.keywords.push(skill);
            }
        });
        jt.requiredSkills = [...new Set(jt.requiredSkills)]; jt.keywords = [...new Set(jt.keywords)];
        const tools = ['salesforce','hubspot','jira','confluence','slack','github','gitlab','figma','tableau','docker','kubernetes','aws','azure'];
        jt.tools = [...new Set(tools.filter(t => jd.includes(t)))];
        const expMatch = jd.match(/(\d+)\+?\s*(?:years?|yrs?)\s*(?:of\s*)?experience/i);
        jt.requiredExperience = expMatch ? parseInt(expMatch[1]) : 0;
        if (/ph\.?d|doctorate/i.test(jd)) jt.educationLevel = 'PhD';
        else if (/master|m\.s\.|m\.a\.|mba/i.test(jd)) jt.educationLevel = 'Masters';
        else if (/bachelor|b\.s\.|b\.a\.|undergrad/i.test(jd)) jt.educationLevel = 'Bachelors';
        const bullets = jd.match(/[•\-\*\d+\.]\s*(.{25,}?)(?=[•\-\*\d+\.\n]|$)/g);
        jt.keyResponsibilities = bullets ? bullets.map(b => b.replace(/^[•\-\*\d+\.]\s*/,'').trim()).filter(b => b.length > 10).slice(0,8) : [];
        updateState({ jobTarget: jt });

        const rd = App.resumeData;
        const allItems = [...new Set([...jt.requiredSkills, ...jt.keywords, ...jt.tools])];
        const candidateText = JSON.stringify(rd).toLowerCase();
        const candidateSkills = rd.skills.map(s => s.toLowerCase().trim());
        const match = { skillMatch: { matched: [], missing: [], score: 0 }, keywordCoverage: { present: [], absent: [], score: 0 }, experienceMatch: { score: 0, gap: '' }, educationMatch: { score: 0 }, overallScore: 0, autoSummary: '', autoBullets: {}, suggestions: [] };
        allItems.forEach(item => {
            if (candidateSkills.some(s => s.includes(item) || item.includes(s)) || candidateText.includes(item)) match.skillMatch.matched.push(item);
            else match.skillMatch.missing.push(item);
        });
        match.skillMatch.score = allItems.length ? Math.round((match.skillMatch.matched.length/allItems.length)*100) : 100;
        const allKW = [...new Set([...jt.keywords, ...jt.tools])];
        allKW.forEach(kw => { if (candidateText.includes(kw.toLowerCase())) match.keywordCoverage.present.push(kw); else match.keywordCoverage.absent.push(kw); });
        match.keywordCoverage.score = allKW.length ? Math.round((match.keywordCoverage.present.length/allKW.length)*100) : 100;
        let totalYears = 0; rd.experience.forEach(exp => { const yrs = (exp.dates||'').match(/(\d{4})/g); if (yrs && yrs.length>=2) totalYears += Math.max(0,parseInt(yrs[1])-parseInt(yrs[0])); });
        match.experienceMatch.score = jt.requiredExperience ? (totalYears>=jt.requiredExperience?90:totalYears>=jt.requiredExperience*0.7?65:30) : (totalYears>0?80:20);
        match.experienceMatch.gap = totalYears>0?`${totalYears}+ years`:'No experience listed';
        const levels={phd:4,masters:3,bachelors:2}; const reqLvl=levels[jt.educationLevel?.toLowerCase()]||0;
        const eduText=JSON.stringify(rd.education).toLowerCase(); let maxLvl=0;
        Object.entries(levels).forEach(([k,v])=>{if(eduText.includes(k))maxLvl=Math.max(maxLvl,v);});
        match.educationMatch.score=reqLvl?(maxLvl>=reqLvl?95:maxLvl>=reqLvl-1?60:25):(rd.education.length>0?85:10);
        if(rd.personal.fullName&&jt.title){match.autoSummary=`Results-driven ${jt.title} with ${totalYears}+ years experience in ${match.skillMatch.matched.slice(0,3).join(', ')||'delivering outcomes'}.`;}
        rd.experience.forEach((exp,i)=>{const skill=match.skillMatch.matched[i%Math.max(1,match.skillMatch.matched.length)];if(skill&&!(exp.bullets||'').toLowerCase().includes(skill.toLowerCase()))match.autoBullets[i]=`• Applied ${skill} to ${(jt.keyResponsibilities[i%Math.max(1,jt.keyResponsibilities.length)]||'key outcomes').toLowerCase()}, achieving measurable impact`;});
        if(match.skillMatch.missing.length>0)match.suggestions.push(`⚠️ Missing ${match.skillMatch.missing.length} skills: ${match.skillMatch.missing.slice(0,6).join(', ')}`);
        if(match.keywordCoverage.absent.length>0)match.suggestions.push(`🔑 Add keywords: ${match.keywordCoverage.absent.slice(0,5).join(', ')}`);
        match.overallScore=Math.round(match.skillMatch.score*0.35+match.keywordCoverage.score*0.30+match.experienceMatch.score*0.20+match.educationMatch.score*0.15);
        updateState({ jobMatch: match });
    }

    function getATSScore(){const rd=App.resumeData;const s={contact:rd.personal.fullName&&rd.personal.email?95:rd.personal.fullName?60:20,summary:rd.summary?rd.summary.length>80?90:65:10,exp:rd.experience.length>=2?90:rd.experience.length===1?60:15,edu:rd.education.length>0?85:20,skills:rd.skills.length>=8?90:rd.skills.length>=5?70:rd.skills.length>0?45:10};return{total:Math.round(Object.values(s).reduce((a,b)=>a+b,0)/5),breakdown:s};}
    function getCompositeScore(){const ats=getATSScore().total;const jm=App.jobMatch.overallScore||0;return jm>0?Math.round(ats*0.4+jm*0.6):ats;}

    function updatePersonal(f,v){const rd={...App.resumeData};rd.personal={...rd.personal,[f]:v};updateState({resumeData:rd});}
    function updateField(f,v){const rd={...App.resumeData};rd[f]=v;updateState({resumeData:rd});}
    function addItem(key,tpl){const rd={...App.resumeData};if(!rd[key])rd[key]=[];rd[key].push({...tpl});updateState({resumeData:rd});}
    function removeItem(key,i){const rd={...App.resumeData};if(rd[key])rd[key].splice(i,1);updateState({resumeData:rd});}
    function updateArrayItem(key,i,f,v){const rd={...App.resumeData};if(rd[key]&&rd[key][i])rd[key][i][f]=v;updateState({resumeData:rd});}
    function addSkill(s){const t=s.trim();if(!t)return;const rd={...App.resumeData};if(!rd.skills.includes(t)){rd.skills.push(t);updateState({resumeData:rd});}}
    function removeSkill(i){const rd={...App.resumeData};rd.skills.splice(i,1);updateState({resumeData:rd});}
    function updateJobTarget(f,v){const jt={...App.jobTarget,[f]:v};updateState({jobTarget:jt});}
    function applyAllSuggestions(){const rd={...App.resumeData};if(App.jobMatch.autoSummary)rd.summary=App.jobMatch.autoSummary;Object.entries(App.jobMatch.autoBullets).forEach(([i,b])=>{const idx=parseInt(i);if(rd.experience[idx]){const ex=rd.experience[idx].bullets||'';rd.experience[idx].bullets=ex?ex+'\n'+b:b;}});[...App.jobMatch.skillMatch.missing,...App.jobMatch.keywordCoverage.absent].forEach(item=>{if(!rd.skills.includes(item))rd.skills.push(item);});updateState({resumeData:rd});parseAndMatch();alert('✅ All suggestions applied! Your resume is now optimized for the target job.');}

    function renderResumePreview(){const rd=App.resumeData;const hasContent=rd.personal.fullName||rd.experience.length>0||rd.education.length>0||rd.skills.length>0;if(!hasContent)return`<div class="flex flex-col items-center justify-center h-64 text-gray-800"><i data-lucide="file-text" class="w-16 h-16 mb-4 text-gray-800"></i><p class="text-base font-medium">Your resume preview appears here</p><p class="text-sm mt-1">Fill in your details to see a live preview</p></div>`;const accent='#2563eb';let h=`<div style="border-bottom:3px solid ${accent};padding-bottom:10px;margin-bottom:16px;"><h1>${rd.personal.fullName||'Your Name'}</h1><div style="font-size:10px;color:#64748b;display:flex;flex-wrap:wrap;gap:10px;margin-top:6px;">${rd.personal.email?`<span>📧 ${rd.personal.email}</span>`:''}${rd.personal.phone?`<span>📱 ${rd.personal.phone}</span>`:''}${rd.personal.location?`<span>📍 ${rd.personal.location}</span>`:''}</div></div>`;if(rd.summary)h+=`<div class="section"><h2 style="color:${accent};">Professional Summary</h2><p>${rd.summary}</p></div>`;if(rd.experience.length>0){h+=`<div class="section"><h2 style="color:${accent};">Experience</h2>`;rd.experience.forEach(exp=>{h+=`<div style="margin-bottom:12px;"><div style="display:flex;justify-content:space-between;"><h3>${exp.title||'Title'}${exp.company?` — ${exp.company}`:''}</h3><span style="font-size:10px;color:#94a3b8;">${exp.dates||''}</span></div>${exp.bullets?`<ul>${exp.bullets.split('\n').filter(b=>b.trim()).map(b=>`<li>${b.replace(/^[•\-]\s*/,'')}</li>`).join('')}</ul>`:''}</div>`;});h+=`</div>`;}if(rd.education.length>0){h+=`<div class="section"><h2 style="color:${accent};">Education</h2>`;rd.education.forEach(edu=>{h+=`<div style="margin-bottom:6px;"><h3>${edu.degree||'Degree'}</h3><p>${[edu.school,edu.year].filter(Boolean).join(' • ')}</p></div>`;});h+=`</div>`;}if(rd.skills.length>0)h+=`<div class="section"><h2 style="color:${accent};">Skills</h2><p>${rd.skills.join(' • ')}</p></div>`;return h;}

function generateCoverLetter() {
    const jobTitle = document.getElementById('cl-job-title').value || 'the position';
    const company = document.getElementById('cl-company').value || 'your company';
    const jobDesc = document.getElementById('cl-job-desc').value;
    const yourInfo = document.getElementById('cl-your-info').value || App.resumeData.summary;
    const name = App.resumeData.personal.fullName || '[Your Name]';
    
    const letter = `Dear Hiring Manager,

I am writing to express my strong interest in the ${jobTitle} position at ${company}. With my background and experience, I am confident in my ability to contribute to your team's success.

${yourInfo ? `Based on my experience, ${yourInfo.toLowerCase()}` : 'Throughout my career, I have developed a strong foundation in delivering results and driving team success.'}

${jobDesc ? `I was particularly drawn to this role because it aligns perfectly with my expertise. The job description emphasizes key areas where I have demonstrated success, and I am excited about the opportunity to bring my skills to ${company}.` : ''}

I am impressed by ${company}'s reputation and would welcome the opportunity to discuss how my skills and experience can contribute to your continued success.

Thank you for considering my application. I look forward to the possibility of discussing this opportunity further.

Sincerely,
${name}`;

    document.getElementById('cover-letter-output').innerHTML = letter.replace(/\n/g, '<br>');
    document.getElementById('copy-cl-btn').classList.remove('hidden');
}

function copyCoverLetter() {
    const text = document.getElementById('cover-letter-output').innerText;
    navigator.clipboard.writeText(text);
    alert('✅ Cover letter copied to clipboard!');
}
    async function exportPDF(){const preview=document.getElementById('resume-preview-area');if(!preview){alert('No resume to export. Fill in your details first.');return;}try{const [jsPDFModule,html2canvasModule]=await Promise.all([import('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js'),import('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js')]);const canvas=await html2canvas(preview,{scale:2,backgroundColor:'#ffffff',logging:false});const {jsPDF}=window.jspdf;const pdf=new jsPDF('p','mm','letter');const w=pdf.internal.pageSize.getWidth();const h=(canvas.height*w)/canvas.width;pdf.addImage(canvas.toDataURL('image/png',1.0),'PNG',0,0,w,h);pdf.save(`${(App.resumeData.personal.fullName||'resume').toLowerCase().replace(/\s+/g,'-')}-job-ready.pdf`);}catch(e){alert('PDF export failed. Please try browser print (Ctrl+P).');}}
        function init(){
        loadFromStorage();
        
        // Idle session management
        let idleTimer;
        const IDLE_TIMEOUT = 30 * 60 * 1000; // 30 minutes

        function resetIdleTimer() {
            clearTimeout(idleTimer);
            idleTimer = setTimeout(() => {
                if (currentUser) {
                    logOut();
                    alert('You have been logged out due to inactivity.');
                }
            }, IDLE_TIMEOUT);
        }

        ['click', 'keypress', 'scroll', 'mousemove'].forEach(event => {
            document.addEventListener(event, resetIdleTimer);
        });

        resetIdleTimer();
        
        const hash = window.location.hash.replace('#', '') || 'dashboard';
        navigate(Views[hash] ? hash : 'dashboard');
        window.addEventListener('hashchange', function() {
            const h = window.location.hash.replace('#', '');
            if (h && Views[h] && h !== App.currentView) navigate(h);
        });
        console.log('✅ ResumeAI Pro ready with Razorpay payments');
    }
    if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();
    </script>
