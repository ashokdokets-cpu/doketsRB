    <!-- PDF Export (loaded on demand) -->
    <script>
        // Lazy load PDF libraries only when needed
        let pdfLibsLoaded = false;
        async function loadPDFLibs() {
            if (pdfLibsLoaded) return true;
            try {
                await Promise.all([
                    new Promise((resolve, reject) => {
                        const script = document.createElement('script');
                        script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
                        script.onload = resolve;
                        script.onerror = reject;
                        document.head.appendChild(script);
                    }),
                    new Promise((resolve, reject) => {
                        const script = document.createElement('script');
                        script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
                        script.onload = resolve;
                        script.onerror = reject;
                        document.head.appendChild(script);
                    })
                ]);
                pdfLibsLoaded = true;
                return true;
            } catch (e) {
                console.error('Failed to load PDF libraries:', e);
                return false;
            }
        }
    </script>

    <script>
    // ============================================
    // APPLICATION STATE (Namespaced to avoid conflicts)
    // ============================================
    const App = {
        currentView: 'dashboard',
        resumeData: {
            personal: { fullName: '', email: '', phone: '', location: '', linkedin: '' },
            summary: '',
            experience: [],
            education: [],
            skills: [],
        },
        jobTarget: {
            title: '', company: '', description: '', parsed: false,
            requiredSkills: [], keywords: [], tools: [],
            requiredExperience: 0, educationLevel: '', keyResponsibilities: []
        },
        jobMatch: {
            overallScore: 0,
            skillMatch: { matched: [], missing: [], score: 0 },
            keywordCoverage: { present: [], absent: [], score: 0 },
            experienceMatch: { score: 0, gap: '' },
            educationMatch: { score: 0 },
            autoSummary: '', autoBullets: {}, suggestions: []
        },
        selectedTemplate: 'modern',
    };

    // ============================================
    // STATE MANAGEMENT
    // ============================================
    function updateState(changes) {
        Object.assign(App, changes);
        saveToStorage();
        refreshView();
    }

    function refreshView() {
        const container = document.getElementById('view-container');
        if (!container) return;
        const viewFn = Views[App.currentView];
        if (viewFn) {
            container.innerHTML = viewFn();
            // Initialize Lucide icons after DOM update
            setTimeout(() => {
                if (typeof lucide !== 'undefined') {
                    lucide.createIcons();
                }
            }, 50);
        }
        // Update active nav state
        document.querySelectorAll('#navbar button[role="menuitem"]').forEach(btn => {
            btn.classList.remove('text-brand-600', 'bg-brand-50');
            if (btn.textContent.toLowerCase().includes(App.currentView) || 
                (App.currentView === 'dashboard' && btn.textContent === 'Dashboard')) {
                btn.classList.add('text-brand-600', 'bg-brand-50');
            }
        });
    }

    function saveToStorage() {
        try {
            const data = {
                resumeData: App.resumeData,
                jobTarget: App.jobTarget,
                jobMatch: App.jobMatch,
                selectedTemplate: App.selectedTemplate,
            };
            localStorage.setItem('resumeai_pro_data', JSON.stringify(data));
        } catch (e) {
            // Silently fail - localStorage might be full or unavailable
        }
    }

    function loadFromStorage() {
        try {
            const raw = localStorage.getItem('resumeai_pro_data');
            if (raw) {
                const data = JSON.parse(raw);
                if (data.resumeData) App.resumeData = data.resumeData;
                if (data.jobTarget) App.jobTarget = data.jobTarget;
                if (data.jobMatch) App.jobMatch = data.jobMatch;
                if (data.selectedTemplate) App.selectedTemplate = data.selectedTemplate;
            }
        } catch (e) {
            // Corrupt data - use defaults
        }
    }

    // ============================================
    // JOB TARGETING ENGINE
    // ============================================
    function parseAndMatch() {
        const jd = App.jobTarget.description.toLowerCase().trim();
        if (jd.length < 30) {
            alert('Please paste a complete job description (at least 30 characters).');
            return;
        }

        const jt = { ...App.jobTarget, parsed: true };
        
        // Comprehensive skill detection
        const skillMap = [
            'python', 'java', 'javascript', 'typescript', 'react', 'angular', 'vue', 'node',
            'sql', 'nosql', 'mongodb', 'postgresql', 'mysql', 'aws', 'azure', 'gcp', 'docker',
            'kubernetes', 'terraform', 'ci/cd', 'git', 'rest api', 'graphql', 'microservices',
            'machine learning', 'artificial intelligence', 'data science', 'data analysis',
            'excel', 'tableau', 'power bi', 'looker', 'snowflake', 'databricks',
            'figma', 'sketch', 'adobe', 'photoshop', 'illustrator',
            'salesforce', 'hubspot', 'marketo', 'google analytics', 'seo', 'sem',
            'agile', 'scrum', 'kanban', 'jira', 'confluence', 'asana',
            'c++', 'c#', '.net', 'ruby', 'php', 'laravel', 'django', 'flask',
            'swift', 'kotlin', 'flutter', 'react native',
            'leadership', 'communication', 'project management', 'stakeholder management',
            'strategic planning', 'analytical', 'problem-solving', 'team management',
            'negotiation', 'mentoring', 'coaching', 'cross-functional',
        ];

        jt.requiredSkills = [];
        jt.keywords = [];
        
        skillMap.forEach(skill => {
            const escaped = skill.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const regex = new RegExp('\\b' + escaped + '\\b', 'gi');
            const matches = jd.match(regex);
            if (matches) {
                const reqSection = jd.search(/required|must have|essential|qualifications/i);
                if (reqSection > -1 && jd.indexOf(skill) > reqSection) {
                    jt.requiredSkills.push(skill);
                } else {
                    jt.keywords.push(skill);
                }
            }
        });

        // Remove duplicates
        jt.requiredSkills = [...new Set(jt.requiredSkills)];
        jt.keywords = [...new Set(jt.keywords)];

        // Tool detection
        const tools = ['salesforce', 'hubspot', 'jira', 'confluence', 'slack', 'github', 'gitlab', 
                       'figma', 'tableau', 'power bi', 'looker', 'docker', 'kubernetes', 'aws', 'azure', 'gcp'];
        jt.tools = [...new Set(tools.filter(t => jd.includes(t)))];

        // Experience extraction
        const expMatch = jd.match(/(\d+)[\+]?\s*(?:years?|yrs?)\s*(?:of\s*)?(?:relevant\s*)?experience/i);
        jt.requiredExperience = expMatch ? parseInt(expMatch[1]) : 0;

        // Education level
        if (/ph\.?d|doctorate|doctoral/i.test(jd)) jt.educationLevel = 'PhD';
        else if (/master'?s|m\.s\.|m\.a\.|mba|graduate degree/i.test(jd)) jt.educationLevel = 'Masters';
        else if (/bachelor'?s|b\.s\.|b\.a\.|undergraduate|college degree/i.test(jd)) jt.educationLevel = 'Bachelors';

        // Key responsibilities
        const bullets = jd.match(/[•\-\*\d+\.]\s*(.{25,}?)(?=[•\-\*\d+\.\n]|$)/g);
        jt.keyResponsibilities = bullets 
            ? bullets.map(b => b.replace(/^[•\-\*\d+\.]\s*/, '').trim()).filter(b => b.length > 10).slice(0, 8)
            : [];

        updateState({ jobTarget: jt });

        // Run match analysis
        const rd = App.resumeData;
        const allRequiredItems = [...new Set([...jt.requiredSkills, ...jt.keywords, ...jt.tools])];
        const candidateText = JSON.stringify(rd).toLowerCase();
        const candidateSkills = rd.skills.map(s => s.toLowerCase().trim());

        const match = {
            skillMatch: { matched: [], missing: [], score: 0 },
            keywordCoverage: { present: [], absent: [], score: 0 },
            experienceMatch: { score: 0, gap: '' },
            educationMatch: { score: 0 },
            overallScore: 0,
            autoSummary: '',
            autoBullets: {},
            suggestions: []
        };

        // Skill matching
        allRequiredItems.forEach(item => {
            const itemLower = item.toLowerCase();
            if (candidateSkills.some(s => s.includes(itemLower) || itemLower.includes(s)) || 
                candidateText.includes(itemLower)) {
                match.skillMatch.matched.push(item);
            } else {
                match.skillMatch.missing.push(item);
            }
        });
        match.skillMatch.score = allRequiredItems.length > 0 
            ? Math.round((match.skillMatch.matched.length / allRequiredItems.length) * 100) 
            : 100;

        // Keyword coverage
        const allKW = [...new Set([...jt.keywords, ...jt.tools])];
        allKW.forEach(kw => {
            if (candidateText.includes(kw.toLowerCase())) {
                match.keywordCoverage.present.push(kw);
            } else {
                match.keywordCoverage.absent.push(kw);
            }
        });
        match.keywordCoverage.score = allKW.length > 0
            ? Math.round((match.keywordCoverage.present.length / allKW.length) * 100)
            : 100;

        // Experience calculation
        let totalYears = 0;
        rd.experience.forEach(exp => {
            const years = (exp.dates || '').match(/(\d{4})/g);
            if (years && years.length >= 2) {
                totalYears += Math.max(0, parseInt(years[1]) - parseInt(years[0]));
            }
        });
        
        if (jt.requiredExperience > 0) {
            match.experienceMatch.score = totalYears >= jt.requiredExperience ? 90 
                : totalYears >= jt.requiredExperience * 0.7 ? 65 : 30;
        } else {
            match.experienceMatch.score = totalYears > 0 ? 80 : 20;
        }
        match.experienceMatch.gap = totalYears > 0 ? `${totalYears}+ years` : 'No experience listed';

        // Education matching
        const levelValues = { phd: 4, masters: 3, bachelors: 2 };
        const requiredLevel = levelValues[jt.educationLevel?.toLowerCase()] || 0;
        const eduText = JSON.stringify(rd.education).toLowerCase();
        let highestLevel = 0;
        Object.entries(levelValues).forEach(([level, value]) => {
            if (eduText.includes(level)) highestLevel = Math.max(highestLevel, value);
        });
        match.educationMatch.score = requiredLevel > 0
            ? (highestLevel >= requiredLevel ? 95 : highestLevel >= requiredLevel - 1 ? 60 : 25)
            : (rd.education.length > 0 ? 85 : 10);

        // Auto-generate summary
        if (rd.personal.fullName && jt.title) {
            const topSkills = match.skillMatch.matched.slice(0, 3).join(', ');
            const resp = jt.keyResponsibilities[0] || 'driving strategic initiatives';
            const company = jt.company || 'a forward-thinking organization';
            match.autoSummary = 
                `Results-driven ${jt.title} with ${totalYears}+ years of experience in ${topSkills || 'delivering measurable outcomes'}. ` +
                `Proven track record of ${resp.toLowerCase()}. Seeking to leverage expertise to drive success at ${company}.`;
        }

        // Auto-generate bullets
        rd.experience.forEach((exp, i) => {
            const skill = match.skillMatch.matched[i % Math.max(1, match.skillMatch.matched.length)];
            const resp = jt.keyResponsibilities[i % Math.max(1, jt.keyResponsibilities.length)];
            if (skill && resp && !(exp.bullets || '').toLowerCase().includes(skill.toLowerCase())) {
                match.autoBullets[i] = 
                    `• Leveraged ${skill} to ${resp.toLowerCase()}, achieving measurable improvements in team performance and operational efficiency`;
            }
        });

        // Suggestions
        if (match.skillMatch.missing.length > 0) {
            match.suggestions.push(
                `⚠️ Missing ${match.skillMatch.missing.length} skills: ${match.skillMatch.missing.slice(0, 6).join(', ')}${match.skillMatch.missing.length > 6 ? ' + more' : ''}`
            );
        }
        if (match.keywordCoverage.absent.length > 0) {
            match.suggestions.push(
                `🔑 Add these keywords to improve ATS match: ${match.keywordCoverage.absent.slice(0, 5).join(', ')}`
            );
        }
        if (jt.requiredExperience > 0 && totalYears < jt.requiredExperience) {
            match.suggestions.push(
                `📅 Experience gap: Job requires ${jt.requiredExperience}+ years, you have ~${totalYears}. Highlight transferable skills and relevant projects.`
            );
        }

        // Overall score (weighted average)
        match.overallScore = Math.round(
            (match.skillMatch.score * 0.35) +
            (match.keywordCoverage.score * 0.30) +
            (match.experienceMatch.score * 0.20) +
            (match.educationMatch.score * 0.15)
        );

        updateState({ jobMatch: match });
    }

    // ============================================
    // ATS SCORING
    // ============================================
    function getATSScore() {
        const rd = App.resumeData;
        const scores = {
            contact: (rd.personal.fullName && rd.personal.email) ? 95 : (rd.personal.fullName ? 60 : 20),
            summary: rd.summary ? (rd.summary.length > 80 ? 90 : 65) : 10,
            experience: rd.experience.length >= 2 ? 90 : rd.experience.length === 1 ? 60 : 15,
            education: rd.education.length > 0 ? 85 : 20,
            skills: rd.skills.length >= 8 ? 90 : rd.skills.length >= 5 ? 70 : rd.skills.length > 0 ? 45 : 10,
        };
        const total = Math.round(Object.values(scores).reduce((a, b) => a + b, 0) / Object.keys(scores).length);
        return { total, breakdown: scores };
    }

    function getCompositeScore() {
        const ats = getATSScore().total;
        const jm = App.jobMatch.overallScore || 0;
        return jm > 0 ? Math.round((ats * 0.4) + (jm * 0.6)) : ats;
    }

    // ============================================
    // DATA MANAGEMENT HELPERS
    // ============================================
    function updatePersonal(field, value) {
        const rd = { ...App.resumeData };
        rd.personal = { ...rd.personal, [field]: value };
        updateState({ resumeData: rd });
    }

    function updateField(field, value) {
        const rd = { ...App.resumeData };
        rd[field] = value;
        updateState({ resumeData: rd });
    }

    function addItem(key, template) {
        const rd = { ...App.resumeData };
        if (!rd[key]) rd[key] = [];
        rd[key].push({ ...template });
        updateState({ resumeData: rd });
    }

    function removeItem(key, index) {
        const rd = { ...App.resumeData };
        if (rd[key]) rd[key].splice(index, 1);
        updateState({ resumeData: rd });
    }

    function updateArrayItem(key, index, field, value) {
        const rd = { ...App.resumeData };
        if (rd[key] && rd[key][index]) rd[key][index][field] = value;
        updateState({ resumeData: rd });
    }

    function addSkill(skill) {
        const trimmed = skill.trim();
        if (!trimmed) return;
        const rd = { ...App.resumeData };
        if (!rd.skills.includes(trimmed)) {
            rd.skills.push(trimmed);
            updateState({ resumeData: rd });
        }
    }

    function removeSkill(index) {
        const rd = { ...App.resumeData };
        rd.skills.splice(index, 1);
        updateState({ resumeData: rd });
    }

    function updateJobTarget(field, value) {
        const jt = { ...App.jobTarget, [field]: value };
        updateState({ jobTarget: jt });
    }

    function applyAllSuggestions() {
        const rd = { ...App.resumeData };
        
        if (App.jobMatch.autoSummary) {
            rd.summary = App.jobMatch.autoSummary;
        }
        
        Object.entries(App.jobMatch.autoBullets).forEach(([index, bullet]) => {
            const i = parseInt(index);
            if (rd.experience[i]) {
                const existing = rd.experience[i].bullets || '';
                rd.experience[i].bullets = existing ? existing + '\n' + bullet : bullet;
            }
        });
        
        const missingItems = [...App.jobMatch.skillMatch.missing, ...App.jobMatch.keywordCoverage.absent];
        missingItems.forEach(item => {
            if (!rd.skills.includes(item)) {
                rd.skills.push(item);
            }
        });
        
        updateState({ resumeData: rd });
        parseAndMatch();
        alert('✅ All suggestions applied! Your resume is now optimized for the target job. You can export it as PDF.');
    }

    // ============================================
    // PDF EXPORT
    // ============================================
    async function exportPDF() {
        const preview = document.getElementById('resume-preview-area');
        if (!preview) {
            alert('No resume to export. Please fill in your details first.');
            return;
        }
        
        const loaded = await loadPDFLibs();
        if (!loaded) {
            alert('Could not load PDF generator. Please check your internet connection and try again.');
            return;
        }
        
        try {
            const canvas = await html2canvas(preview, { 
                scale: 2, 
                useCORS: true, 
                backgroundColor: '#ffffff',
                logging: false
            });
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'letter');
            const pageWidth = pdf.internal.pageSize.getWidth();
            const pageHeight = (canvas.height * pageWidth) / canvas.width;
            pdf.addImage(canvas.toDataURL('image/png', 1.0), 'PNG', 0, 0, pageWidth, pageHeight);
            
            const filename = (App.resumeData.personal.fullName || 'resume')
                .toLowerCase().replace(/\s+/g, '-') + '-job-ready.pdf';
            pdf.save(filename);
        } catch (e) {
            console.error('PDF export failed:', e);
            alert('PDF export failed. Please try again or use browser print (Ctrl+P).');
        }
    }

    // ============================================
    // RESUME PREVIEW RENDERER
    // ============================================
    function renderResumePreview() {
        const rd = App.resumeData;
        const hasContent = rd.personal.fullName || rd.experience.length > 0 || rd.education.length > 0 || rd.skills.length > 0;
        
        if (!hasContent) {
            return `<div class="flex flex-col items-center justify-center h-64 text-gray-400">
                <i data-lucide="file-text" class="w-16 h-16 mb-4 text-gray-300"></i>
                <p class="text-base font-medium">Your resume preview appears here</p>
                <p class="text-sm mt-1">Fill in your details in the editor to see a live preview</p>
            </div>`;
        }

        let html = '';
        const accent = {
            modern: '#2563eb', classic: '#1e293b', creative: '#e11d48', 
            executive: '#d97706', professional: '#0f172a', minimalist: '#64748b',
            academic: '#1e40af', europass: '#2563eb'
        }[App.selectedTemplate] || '#2563eb';

        // Header
        html += `<div style="border-bottom: 3px solid ${accent}; padding-bottom: 10px; margin-bottom: 16px;">`;
        html += `<h1 style="font-size: 24px; color: #1e293b; margin: 0;">${rd.personal.fullName || 'Your Name'}</h1>`;
        const contactItems = [];
        if (rd.personal.email) contactItems.push(`<span>📧 ${rd.personal.email}</span>`);
        if (rd.personal.phone) contactItems.push(`<span>📱 ${rd.personal.phone}</span>`);
        if (rd.personal.location) contactItems.push(`<span>📍 ${rd.personal.location}</span>`);
        if (rd.personal.linkedin) contactItems.push(`<span>🔗 ${rd.personal.linkedin}</span>`);
        if (contactItems.length > 0) {
            html += `<div style="font-size: 10px; color: #64748b; display: flex; flex-wrap: wrap; gap: 10px; margin-top: 6px;">${contactItems.join('')}</div>`;
        }
        html += `</div>`;

        // Summary
        if (rd.summary) {
            html += `<div class="section"><h2 style="color: ${accent}; border-bottom-color: ${accent};">Professional Summary</h2>`;
            html += `<p>${rd.summary}</p></div>`;
        }

        // Experience
        if (rd.experience.length > 0) {
            html += `<div class="section"><h2 style="color: ${accent}; border-bottom-color: ${accent};">Professional Experience</h2>`;
            rd.experience.forEach(exp => {
                html += `<div style="margin-bottom: 12px;">`;
                html += `<div style="display: flex; justify-content: space-between; align-items: baseline;">`;
                html += `<h3 style="margin: 0;">${exp.title || 'Position Title'}</h3>`;
                html += `<span style="font-size: 10px; color: #94a3b8; white-space: nowrap;">${exp.dates || ''}</span>`;
                html += `</div>`;
                if (exp.company) html += `<p style="margin: 2px 0; font-style: italic;">${exp.company}</p>`;
                if (exp.bullets) {
                    const bulletList = exp.bullets.split('\n').filter(b => b.trim());
                    if (bulletList.length > 0) {
                        html += `<ul>${bulletList.map(b => `<li>${b.replace(/^[•\-]\s*/, '')}</li>`).join('')}</ul>`;
                    }
                }
                html += `</div>`;
            });
            html += `</div>`;
        }

        // Education
        if (rd.education.length > 0) {
            html += `<div class="section"><h2 style="color: ${accent}; border-bottom-color: ${accent};">Education</h2>`;
            rd.education.forEach(edu => {
                html += `<div style="margin-bottom: 6px;">`;
                html += `<h3 style="margin: 0;">${edu.degree || 'Degree'}</h3>`;
                const eduDetails = [edu.school, edu.year].filter(Boolean).join(' • ');
                if (eduDetails) html += `<p style="margin: 2px 0;">${eduDetails}</p>`;
                html += `</div>`;
            });
            html += `</div>`;
        }

        // Skills
        if (rd.skills.length > 0) {
            html += `<div class="section"><h2 style="color: ${accent}; border-bottom-color: ${accent};">Skills & Expertise</h2>`;
            html += `<p>${rd.skills.join(' • ')}</p></div>`;
        }

        return html;
    }

            <div class="grid md:grid-cols-3 gap-6 max-w-4xl mx-auto">
                ${plans.map(plan => `
                <div class="bg-white rounded-2xl p-7 border-2 ${plan.popular ? 'border-brand-600 shadow-xl relative scale-105' : 'border-gray-200 shadow-sm'}">
                    ${plan.popular ? '<div class="absolute -top-3.5 left-1/2 -translate-x-1/2 bg-brand-600 text-white px-4 py-1 rounded-full text-xs font-bold">Most Popular</div>' : ''}
                    <h3 class="text-xl font-bold text-gray-900 mb-1">${plan.name}</h3>
                    <div class="mb-5">
                        <span class="text-4xl font-extrabold text-gray-900">${plan.price}</span>
                        <span class="text-gray-500 text-sm">${plan.period}</span>
                    </div>
                    <ul class="space-y-2.5 mb-6">
                        ${plan.features.map(f => `<li class="flex items-start gap-2 text-sm text-gray-700"><i data-lucide="check" class="w-4 h-4 text-success flex-shrink-0 mt-0.5"></i> ${f}</li>`).join('')}
                    </ul>
                    <button onclick="navigate('signup')" class="w-full py-3 rounded-xl font-bold transition ${plan.popular ? 'bg-brand-600 text-white hover:bg-brand-700 shadow-md' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'}">
                        ${plan.cta}

        </div>`;
    };

    Views.signup = function() {
        return `
        <div class="min-h-[70vh] flex items-center justify-center px-4 animate-fade-in">
            <div class="bg-white rounded-2xl p-8 w-full max-w-md shadow-xl border border-gray-100">
                <div class="text-center mb-6">
                    <div class="w-14 h-14 bg-gradient-to-br from-brand-500 to-accent-500 rounded-xl flex items-center justify-center mx-auto mb-4 shadow-md">
                        <i data-lucide="user-plus" class="w-7 h-7 text-white"></i>
                    </div>
                    <h2 class="text-2xl font-heading font-extrabold text-gray-900">Create Your Account</h2>
                    <p class="text-sm text-gray-500 mt-1">Start building professional resumes in minutes</p>

                <div class="space-y-3">
                    <input type="text" placeholder="Full Name" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none text-sm">
                    <input type="email" placeholder="Email address" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none text-sm">

    Views.login = function() {
        return `
        <div class="min-h-[70vh] flex items-center justify-center px-4 animate-fade-in">
            <div class="bg-white rounded-2xl p-8 w-full max-w-md shadow-xl border border-gray-100">
                <div class="text-center mb-6">
                    <div class="w-14 h-14 bg-gradient-to-br from-brand-500 to-accent-500 rounded-xl flex items-center justify-center mx-auto mb-4 shadow-md">
                        <i data-lucide="log-in" class="w-7 h-7 text-white"></i>
                    </div>
                    <h2 class="text-2xl font-heading font-extrabold text-gray-900">Welcome Back</h2>
                    <p class="text-sm text-gray-500 mt-1">Log in to access your resumes</p>

                <div class="space-y-3">
                    <input type="email" placeholder="Email address" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none text-sm">

                    <button onclick="navigate('dashboard')" class="w-full py-3 bg-brand-600 text-white rounded-xl hover:bg-brand-700 transition font-bold shadow-md">Log In</button>
                </div>
                <p class="text-center text-sm text-gray-500 mt-5">
                    Don't have an account? 
                    <button onclick="navigate('signup')" class="text-brand-600 font-semibold hover:underline">Sign Up</button>
                </p>
            </div>
        </div>`;
    };

    // ============================================
    // NAVIGATION
    // ============================================
    function navigate(view) {
        if (!Views[view]) view = 'dashboard';
        updateState({ currentView: view });
        window.location.hash = view;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function toggleMobileNav() {
        const nav = document.getElementById('mobile-nav');
        nav.classList.toggle('hidden');
    }

    function closeMobileNav() {
        document.getElementById('mobile-nav').classList.add('hidden');
    }

    // ============================================
    // ERROR HANDLING & INITIALIZATION
    // ============================================
    function init() {
        // Load saved data
        loadFromStorage();
        
        // Determine initial view from URL hash
        const hash = window.location.hash.replace('#', '') || 'dashboard';
        navigate(Views[hash] ? hash : 'dashboard');
        
        // Handle browser back/forward
        window.addEventListener('hashchange', function() {
            const newHash = window.location.hash.replace('#', '');
            if (newHash && Views[newHash] && newHash !== App.currentView) {
                navigate(newHash);
            }
        });
        
        // Handle errors gracefully
        window.addEventListener('error', function(e) {
            console.warn('App error:', e.message);
            // Continue running - don't crash
        });
        
        console.log('✅ ResumeAI Pro initialized successfully');
        console.log('📊 Views loaded:', Object.keys(Views).join(', '));
        console.log('💾 LocalStorage:', typeof localStorage !== 'undefined' ? 'Available' : 'Unavailable');
        console.log('📱 Ready for production deployment');
    }

    // Start the application
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
    </script>

</body>
</html>
